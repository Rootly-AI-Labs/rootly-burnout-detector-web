name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  frontend-build:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Type check
      run: npm run type-check
      
    - name: Lint
      run: npm run lint
    
    - name: Build
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: ${{ github.ref == 'refs/heads/main' && 'https://rootly-burnout-detector-web-production.up.railway.app' || 'https://rootly-burnout-detector-web-dev.up.railway.app' }}

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: python -m pytest tests/ -v
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        JWT_SECRET_KEY: test-secret-key

  deploy-dev:
    name: Deploy to Development
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    needs: [frontend-build, backend-tests]
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to Railway Dev
      run: |
        echo "🚀 Deploying to development environment"
        echo "Railway will auto-deploy dev branch"
        
  deploy-prod:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [frontend-build, backend-tests]
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to Railway Production
      run: |
        echo "🚀 Deploying to production environment"
        echo "Railway will auto-deploy main branch"